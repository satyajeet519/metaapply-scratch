# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Strapi backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      # Install dependencies inside Strapi folder
      - name: Install dependencies
        working-directory: metaapply-backend
        run: npm install

      # Build Strapi admin
      - name: Build Strapi
        working-directory: metaapply-backend
        run: npm run build
        
      # Create zip of backend (so Azure receives it as root)
      - name: Create deployment package
        run: |
          cd metaapply-backend
          zip -r ../release.zip .

      # Upload artifact
      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: strapi-package
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      # Download artifact
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: strapi-package

      # Deploy to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'strapi-backend'
          slot-name: 'Production'
          package: release.zip

          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8D0A1936923C4DE780710C43C8A39720 }}





