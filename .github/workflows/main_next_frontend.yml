name: Deploy Next.js Frontend to Azure
 
on:
  push:
    branches:
      - main
  workflow_dispatch:
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
 
      - name: Install dependencies
        working-directory: frontend
        run: npm install
 
      - name: Build Next.js
        working-directory: frontend
        run: npm run build
 
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: "next-frontend"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_NEXT_FRONTEND }}
          package: ./frontend
